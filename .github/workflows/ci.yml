name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ci-${{ hashFiles('Cargo.lock') }}

      - name: Test all crates
        run: |
          cargo test -p codie
          cargo test -p bs-artisan
          cargo test -p gently-codec

      - name: Build release binaries
        run: cargo build --release -p codie -p bs-artisan -p gently-codec

  node:
    name: Node tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target/
          key: ci-node-${{ hashFiles('Cargo.lock') }}

      - name: Build binaries for hook tests
        run: cargo build --release -p codie -p bs-artisan -p gently-codec

      - name: Install npm deps
        run: npm install --ignore-scripts

      - name: Run demo headless
        run: bash demo/run-demo.sh --no-tmux

      - name: Verify
        run: node src/verify.js
