name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_zig: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_zig: true
          - os: macos-13
            target: x86_64-apple-darwin
            use_zig: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_zig: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild (Linux cross-compile)
        if: matrix.use_zig
        run: |
          pip3 install ziglang
          cargo install cargo-zigbuild --locked

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-

      - name: Build binaries
        run: |
          if [ "${{ matrix.use_zig }}" = "true" ]; then
            cargo zigbuild --release --target ${{ matrix.target }} -p codie
            cargo zigbuild --release --target ${{ matrix.target }} -p bs-artisan
            cargo zigbuild --release --target ${{ matrix.target }} -p gently-codec
          else
            cargo build --release --target ${{ matrix.target }} -p codie
            cargo build --release --target ${{ matrix.target }} -p bs-artisan
            cargo build --release --target ${{ matrix.target }} -p gently-codec
          fi

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/codie  dist/codie-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/barf   dist/barf-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/codec  dist/codec-${{ matrix.target }}
          chmod +x dist/*

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  npm-publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
